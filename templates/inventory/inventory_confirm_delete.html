{% extends 'base_admin.html' %}

{% block title %}Delete Item | Sayyednaa Farms{% endblock %}

{% block admin_content %}
<section class="section" style="padding-top: 2rem;">
    <div class="card" style="max-width: 500px; padding: 2.5rem; text-align: center;">
        <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #f44336; margin-bottom: 2rem;"></i>
        <h2>Are you sure?</h2>
        <p style="color: var(--text-muted); margin: 1rem 0 2rem 0;">You are about to delete <strong>{{ object.name }}</strong>. This action cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn" style="background: #f44336; color: white; padding: 0.8rem 2.5rem; margin-top: 0;">Yes, Delete It</button>
            <a href="{% url 'inventory:list' %}" class="btn" style="border: 1px solid var(--glass-border); color: var(--text-light); margin-left: 1rem;">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
