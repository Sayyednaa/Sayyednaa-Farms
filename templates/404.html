{% extends 'base.html' %}

{% block title %}Page Not Found | Sayyednaa Farms{% endblock %}

{% block content %}
<section class="container animate-up" style="min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center;">
    <div class="card glass" style="max-width: 500px; padding: 4rem 2rem;">
        <div style="width: 100px; height: 100px; background: rgba(99, 102, 241, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: var(--accent); font-size: 3rem;">
            <i class="fas fa-compass"></i>
        </div>
        <h1 style="font-size: 4rem; margin-bottom: 1rem;" class="text-gradient">404</h1>
        <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Lost in the Wild</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2.5rem; line-height: 1.6;">
            The page you are looking for doesn't exist or has been moved to another part of the farm.
        </p>
        <a href="{% url 'core:home' %}" class="btn btn-primary">Return Home</a>
    </div>
</section>
{% endblock %}
