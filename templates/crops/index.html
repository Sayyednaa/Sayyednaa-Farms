{% extends 'base_admin.html' %}

{% block admin_content %}
<div class="animate-up">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
        <h2 style="font-size: 1.75rem;">Crop Management</h2>
        <a href="{% url 'crops:add' %}" class="btn btn-primary" style="padding: 0.6rem 1.25rem;">+ New Plantation</a>
    </div>

    <div class="card" style="padding: 0;">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Variety</th>
                        <th>Location</th>
                        <th>Plants</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in plantations %}
                    <tr>
                        <td style="font-weight: 700;">{{ p.variety }}</td>
                        <td>{{ p.location }}</td>
                        <td>{{ p.number_of_plants }}</td>
                        <td>
                            <span class="badge {% if p.status == 'Growing' %}badge-success{% elif p.status == 'Harvesting' %}badge-warning{% else %}badge-danger{% endif %}">
                                {{ p.status }}
                            </span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 0.75rem;">
                                <a href="{% url 'crops:edit' p.pk %}" style="color: var(--primary);"><i class="fas fa-edit"></i></a>
                                <a href="{% url 'crops:delete' p.pk %}" style="color: #EF4444;"><i class="fas fa-trash"></i></a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" style="padding: 4rem; text-align: center; color: var(--text-muted);">No records found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
