{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In | Sayyednaa Farms - Premium Access{% endblock %}

{% block content %}
<div class="container animate-fade-in-up" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem;">
    <div class="card glass" style="width: 100%; max-width: 450px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <div style="width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="fas fa-lock" style="font-size: 2rem; color: var(--primary);"></i>
            </div>
            <h1 class="font-heading" style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome <span class="text-gradient">Back</span></h1>
            <p style="color: var(--text-secondary); font-size: 0.9375rem;">Access your premium farm portal</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label class="form-label" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.75rem; color: var(--primary); font-weight: 600;">Forgot Password?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">
                Sign In <i class="fas fa-sign-in-alt" style="margin-left: 0.75rem;"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border-glass);">
            <p style="color: var(--text-muted); font-size: 0.875rem;">
                New to the farm? <a href="{% url 'core:register' %}" style="color: var(--primary); font-weight: 700; margin-left: 0.5rem;">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
