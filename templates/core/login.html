{% extends 'base.html' %}

{% block title %}Sign In | Sayyednaa Farms{% endblock %}

{% block content %}
<div class="auth-container animate-up">
    <div class="card glass auth-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 70px; height: 70px; background: var(--primary-glow); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--primary); font-size: 1.75rem;">
                <i class="fas fa-lock"></i>
            </div>
            <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Welcome <span class="text-gradient">Back</span></h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Access your premium farm portal</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="label">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label class="label" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.75rem; color: var(--primary); font-weight: 700;">Forgot?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">
                Sign In <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border-glass);">
            <p style="color: var(--text-muted); font-size: 0.875rem;">
                New to the farm? <a href="{% url 'core:register' %}" style="color: var(--primary); font-weight: 700; margin-left: 0.5rem;">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
