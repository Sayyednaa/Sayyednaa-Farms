{% extends 'base.html' %}

{% block content %}
<section class="container" style="padding-top: 6rem;">
    <div style="display: flex; flex-direction: column; gap: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <h1 class="section-title" style="text-align: left; margin: 0;">Admin <span class="text-gradient">Portal</span></h1>
            <div class="badge badge-success">Staff Session Active</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 2rem;">
            <!-- Horizontal Navigation for Admin -->
            <div class="glass" style="padding: 0.5rem; border-radius: 15px; overflow-x: auto; white-space: nowrap; display: flex; gap: 0.5rem;">
                <a href="{% url 'core:dashboard' %}" class="btn {% if request.resolver_match.url_name == 'dashboard' %}btn-primary{% else %}btn-outline{% endif %}" style="padding: 0.6rem 1.25rem; font-size: 0.85rem;">
                    <i class="fas fa-chart-line"></i> Summary
                </a>
                <a href="{% url 'livestock:index' %}" class="btn {% if 'livestock' in request.path %}btn-primary{% else %}btn-outline{% endif %}" style="padding: 0.6rem 1.25rem; font-size: 0.85rem;">
                    <i class="fas fa-paw"></i> Livestock
                </a>
                <a href="{% url 'crops:index' %}" class="btn {% if 'crops' in request.path %}btn-primary{% else %}btn-outline{% endif %}" style="padding: 0.6rem 1.25rem; font-size: 0.85rem;">
                    <i class="fas fa-leaf"></i> Crops
                </a>
                <a href="{% url 'inventory:list' %}" class="btn {% if 'inventory' in request.path %}btn-primary{% else %}btn-outline{% endif %}" style="padding: 0.6rem 1.25rem; font-size: 0.85rem;">
                    <i class="fas fa-boxes"></i> Inventory
                </a>
                <a href="{% url 'shop:staff_dashboard' %}" class="btn {% if 'shop/staff' in request.path %}btn-primary{% else %}btn-outline{% endif %}" style="padding: 0.6rem 1.25rem; font-size: 0.85rem;">
                    <i class="fas fa-store"></i> Shop
                </a>
            </div>

            <div class="animate-up">
                {% block admin_content %}{% endblock %}
            </div>
        </div>
    </div>
</section>

<style>
    /* Admin Specific Overrides */
    @media (min-width: 1024px) {
        /* Optional: Sidebar layout for admin could go here */
    }
</style>
{% endblock %}
