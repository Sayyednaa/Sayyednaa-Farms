{% extends 'base_admin.html' %}

{% block title %}Confirm Deletion | Sayyednaa Farms{% endblock %}

{% block admin_content %}
<section class="section" style="padding-top: 5rem;">
    <div class="card" style="max-width: 500px; margin: 0 auto; padding: 3rem; text-align: center; border-color: rgba(244, 67, 54, 0.3);">
        <i class="fas fa-exclamation-triangle" style="font-size: 5rem; color: #f44336; margin-bottom: 2rem;"></i>
        <h2 style="font-size: 2rem; margin-bottom: 1rem;">Confirm Deletion</h2>
        <p style="color: var(--text-muted); margin-bottom: 3rem;">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button type="submit" class="btn" style="background: #f44336; color: white; padding: 0.8rem 2.5rem; margin-top: 0;">Delete Permanently</button>
                <a href="javascript:history.back()" class="btn" style="border: 1px solid var(--glass-border); color: white; margin-top: 0;">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
