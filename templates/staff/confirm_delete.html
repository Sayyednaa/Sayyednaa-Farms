{% extends 'base_admin.html' %}

{% block admin_content %}
<div class="animate-up" style="max-width: 500px; margin: 2rem auto; text-align: center;">
    <div class="card glass" style="padding: 4rem 2rem; border-color: rgba(239, 68, 68, 0.2);">
        <div style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: #EF4444; font-size: 2.5rem;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 style="font-size: 1.75rem; margin-bottom: 1rem;">Confirm Deletion</h2>
        <p style="color: var(--text-muted); margin-bottom: 3rem; line-height: 1.6;">Are you sure you want to delete <strong>{{ object }}</strong>? This action is permanent and cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button type="submit" class="btn" style="background: #EF4444; color: white; width: 100%;">Delete Permanently</button>
                <a href="javascript:history.back()" class="btn btn-outline" style="width: 100%;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
