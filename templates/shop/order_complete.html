{% extends 'base.html' %}

{% block title %}Order Complete | Sayyednaa Farms Shop{% endblock %}

{% block content %}
<section class="section" style="text-align: center; height: 70vh; display: flex; flex-direction: column; justify-content: center;">
    <div class="fade-in">
        <i class="fas fa-check-circle" style="font-size: 6rem; color: #4caf50; margin-bottom: 2rem;"></i>
        <h1 style="font-size: 3.5rem; margin-bottom: 1rem;">Thank You for Your Order!</h1>
        <p style="font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto;">Your order #{{ order.id }} has been received and is being processed. We will contact you shortly for delivery details.</p>
        
        <div style="margin-top: 3rem;">
            <a href="{% url 'shop:product_list' %}" class="btn btn-primary" style="margin-top: 0;">Continue Shopping</a>
        </div>
    </div>
</section>
{% endblock %}
