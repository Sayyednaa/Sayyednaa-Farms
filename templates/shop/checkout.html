{% extends 'base.html' %}

{% block title %}SAYYEDNAA FARMS | CHECKOUT{% endblock %}

{% block content %}
<section class="container animate-up" style="padding-top: 6rem;">
    <div style="max-width: 800px; margin: 0 auto;">
        <h1 class="section-title">Secure <span class="text-gradient">Checkout</span></h1>
        <div class="card glass" style="padding: 2.5rem; margin-top: 2rem;">
            <form method="post">
                {% csrf_token %}
                <div class="badge badge-warning" style="width: 100%; justify-content: center; margin-bottom: 2rem; padding: 1rem;">
                    <i class="fas fa-info-circle"></i> Farmhouse Collection Only - Online Bookings Get Priority
                </div>

                <div class="grid grid-2" style="margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label class="label">Full Name</label>
                        <input type="text" name="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="label">Email Address</label>
                        <input type="email" name="email" required placeholder="john@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label class="label">Phone Number</label>
                    <input type="text" name="phone" required placeholder="+91 0000000000">
                </div>
                <div class="form-group" style="margin-bottom: 2.5rem;">
                    <label class="label">Notes / Estimated Collection Time</label>
                    <textarea name="address" required placeholder="Let us know when you plan to visit the farm for collection" style="height: 100px;"></textarea>
                </div>

                <div style="border-top: 1px solid var(--border-glass); padding-top: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem;">
                    <p style="color: var(--text-muted); font-size: 0.9rem;"><i class="fas fa-shield-alt"></i> Secure Payment on Delivery</p>
                    <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem;">Place Order <i class="fas fa-check"></i></button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
